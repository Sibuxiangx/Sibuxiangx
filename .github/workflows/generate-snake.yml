name: Generate Profile Assets

on:
  schedule:
    # Run every 12 hours
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  # ===== lowlighter/metrics Cards =====
  metrics:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- Isometric Commit Calendar (Full Year) ---
      - name: "Metrics: Isometric Calendar"
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Sibuxiangx
          filename: metrics-isocalendar.svg
          base: ""
          config_timezone: Asia/Shanghai
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_output: svg
          extras_css: |
            :root { --color-calendar-graph-day-bg: #1a1b26 }
            svg { background-color: #1a1b26 !important; color: #c0caf5 !important; }
            h2, .field { color: #c0caf5 !important; }
            .ct text { fill: #c0caf5 !important; }

      # --- Languages (Indepth Analysis) ---
      - name: "Metrics: Languages"
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Sibuxiangx
          filename: metrics-languages.svg
          base: ""
          config_timezone: Asia/Shanghai
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: lines, bytes-size, percentage
          plugin_languages_analysis_timeout: 30
          plugin_languages_analysis_timeout_repositories: 7.5
          plugin_languages_limit: 8
          config_output: svg
          extras_css: |
            svg { background-color: #1a1b26 !important; color: #c0caf5 !important; }
            h2, .field { color: #c0caf5 !important; }

      # --- Notable Contributions ---
      - name: "Metrics: Notable Contributions"
        uses: stalomeow/metrics@projects-v2
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Sibuxiangx
          filename: metrics-habits.svg
          base: ""
          config_timezone: Asia/Shanghai
          plugin_notable: yes
          plugin_notable_from: all
          config_output: svg
          extras_css: |
            svg { background-color: #1a1b26 !important; color: #c0caf5 !important; }
            h2, .field { color: #c0caf5 !important; }

      # --- Achievements ---
      - name: "Metrics: Achievements"
        uses: stalomeow/metrics@projects-v2
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Sibuxiangx
          filename: metrics-achievements.svg
          base: ""
          config_timezone: Asia/Shanghai
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: C
          config_output: svg
          extras_css: |
            svg { background-color: #1a1b26 !important; color: #c0caf5 !important; }
            h2, .field { color: #c0caf5 !important; }

      # --- Contribution Calendar ---
      - name: "Metrics: Calendar"
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Sibuxiangx
          filename: metrics-calendar.svg
          base: ""
          config_timezone: Asia/Shanghai
          plugin_calendar: yes
          plugin_calendar_limit: 1
          config_output: svg
          extras_css: |
            svg { background-color: #1a1b26 !important; color: #c0caf5 !important; }
            h2, .field { color: #c0caf5 !important; }

  # ===== Contribution Snake Animation =====
  snake:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate Snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push Snake SVG to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
